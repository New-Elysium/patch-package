on:
  pull_request:
  push:
    branches: [master]
name: Test
jobs:
  test:
    name: ${{ matrix.os }} on bun ${{ matrix.bun }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        bun: ["1.3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}
      - run: bun install
      - run: bun run typecheck
      - run: bun run build
      - run: git config --global user.email "patch-package@test.com"
      - run: git config --global user.name "patch-package"
      - run: bunx jest --testPathPattern="src/"
      - run: bun run test
